---
# Wolf Container Setup via Docker Compose
# Based on official quickstart: https://games-on-whales.github.io/wolf/stable/user/quickstart.html

- name: Create Wolf configuration directory
  ansible.builtin.file:
    path: "{{ wolf_config_dir }}"
    state: directory
    mode: '0755'

- name: Create Nvidia driver volume
  community.docker.docker_volume:
    name: "{{ wolf_nvidia_driver_volume }}"
    state: present
  when: wolf_nvidia_enabled | bool

- name: Populate Nvidia driver volume
  ansible.builtin.shell: |
    docker create --rm --mount source={{ wolf_nvidia_driver_volume }},destination=/usr/nvidia {{ wolf_nvidia_driver_image }} sh
  register: nvidia_volume_create
  changed_when: nvidia_volume_create.rc == 0
  when: wolf_nvidia_enabled | bool

- name: Build Lutris Desktop image
  when: wolf_desktop_enabled | bool
  block:
    - name: Create desktop image build directory
      ansible.builtin.file:
        path: "/tmp/lutris-desktop"
        state: directory
        mode: '0755'

    - name: Copy Dockerfile
      ansible.builtin.copy:
        src: "lutris-desktop/Dockerfile"
        dest: "/tmp/lutris-desktop/Dockerfile"
        mode: '0644'

    - name: Copy scripts
      ansible.builtin.copy:
        src: "lutris-desktop/scripts/"
        dest: "/tmp/lutris-desktop/scripts/"
        mode: '0755'

    - name: Copy configs
      ansible.builtin.copy:
        src: "lutris-desktop/configs/"
        dest: "/tmp/lutris-desktop/configs/"
        mode: '0755'

    - name: Build desktop image
      community.docker.docker_image:
        name: "{{ wolf_desktop_image }}"
        source: build
        build:
          path: "/tmp/lutris-desktop"
          pull: no
        state: present
        force_source: no

    - name: Clean up build directory
      ansible.builtin.file:
        path: "/tmp/lutris-desktop"
        state: absent

    - name: Create WolfDesktop storage directories
      ansible.builtin.file:
        path: "{{ wolf_desktop_storage_path }}/{{ item }}"
        state: directory
        owner: "{{ wolf_desktop_storage_owner }}"
        group: "{{ wolf_desktop_storage_owner }}"
        mode: '0755'
      loop:
        - "data"
        - "games"
      when: wolf_desktop_enabled | bool

- name: Deploy Wolf docker-compose.yml
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ wolf_compose_dir }}/docker-compose.yml"
    mode: '0644'
  register: wolf_compose_result

- name: Start Wolf container via docker compose
  ansible.builtin.command:
    cmd: docker compose up -d
    chdir: "{{ wolf_compose_dir }}"
  register: wolf_compose_up
  changed_when: "'Started' in wolf_compose_up.stdout or 'Created' in wolf_compose_up.stdout"

- name: Wait for Wolf container to be running
  ansible.builtin.command: docker inspect --format={% raw %}'{{.State.Running}}'{% endraw %} {{ wolf_container_name }}
  register: wolf_container_running
  until: wolf_container_running.stdout == "true"
  retries: 10
  delay: 2
  changed_when: false
  when: wolf_nvidia_enabled | bool

- name: Run ldconfig in Wolf container
  ansible.builtin.shell: |
    docker exec {{ wolf_container_name }} ldconfig
  changed_when: true
  when: wolf_nvidia_enabled | bool

- name: Show Wolf container status
  ansible.builtin.debug:
    msg: |
      Wolf container has been started via docker compose.
      Container name: {{ wolf_container_name }}
      Network mode: {{ wolf_network_mode }}
      Compose file: {{ wolf_compose_dir }}/docker-compose.yml

      To pair with Moonlight:
      1. Open Moonlight on your client device
      2. Add your server IP: {{ ansible_facts['host'] | default(ansible_facts['default_ipv4']['address']) }}
      3. Enter the PIN shown in Moonlight at: http://{{ ansible_facts['host'] | default(ansible_facts['default_ipv4']['address']) }}:{{ wolf_http_port }}/pin/

      If you see a black screen with cursor, Wolf is downloading required images.
      Check logs with: docker logs {{ wolf_container_name }}

- name: Deploy Wolf systemd service
  ansible.builtin.template:
    src: wolf.service.j2
    dest: "{{ wolf_systemd_service_path }}/wolf.service"
    mode: '0644'
  notify: reload systemd daemon
  when: wolf_systemd_enabled | bool

- name: Enable Wolf systemd service
  ansible.builtin.systemd:
    name: wolf
    enabled: "{{ wolf_systemd_enabled }}"
    daemon_reload: yes
  when: wolf_systemd_enabled | bool
