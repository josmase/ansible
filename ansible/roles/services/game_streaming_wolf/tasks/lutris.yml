---
# Lutris Installation for Ubuntu

- name: Install Lutris on Debian/Ubuntu
  when: ansible_os_family == "Debian"
  block:
    - name: Add Lutris stable repository
      ansible.builtin.apt_repository:
        repo: "ppa:lutris-team/lutris"
        state: present
        filename: lutris

    - name: Install Lutris and dependencies
      ansible.builtin.apt:
        name:
          - lutris
          - wine64
          - wine32
          - libgnutls30:i386
          - libgpg-error0:i386
          - libxml2:i386
          - libasound2:i386
          - libsdl2-2.0-0:i386
          - libfreetype6:i386
          - libdbus-1-3:i386
          - libsqlite3-0:i386
        state: present
        update_cache: yes

    - name: Create Lutris games directory
      ansible.builtin.file:
        path: "{{ wolf_lutris_base_path }}"
        state: directory
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: '0755'

- name: Install Lutris on Arch Linux
  when: ansible_os_family == "Archlinux"
  block:
    - name: Install Lutris dependencies (Arch)
      community.general.pacman:
        name:
          - wine
          - giflib
          - lib32-giflib
          - libpng
          - lib32-libpng
          - libldap
          - lib32-libldap
          - gnutls
          - lib32-gnutls
          - mpg123
          - lib32-mpg123
          - openal
          - lib32-openal
          - v4l-utils
          - lib32-v4l-utils
          - libpulse
          - lib32-libpulse
          - alsa-plugins
          - lib32-alsa-plugins
          - alsa-lib
          - lib32-alsa-lib
          - libjpeg-turbo
          - lib32-libjpeg-turbo
          - sqlite
          - lib32-sqlite
          - libxcomposite
          - lib32-libxcomposite
          - libxinerama
          - lib32-libxinerama
          - ncurses
          - lib32-ncurses
          - opencl-icd-loader
          - lib32-opencl-icd-loader
          - libxslt
          - lib32-libxslt
          - libva
          - lib32-libva
          - gtk3
          - lib32-gtk3
          - gst-plugins-base-libs
          - lib32-gst-plugins-base-libs
          - vulkan-icd-loader
          - lib32-vulkan-icd-loader
          - lutris
        state: present

    - name: Create Lutris games directory (Arch)
      ansible.builtin.file:
        path: "{{ wolf_lutris_base_path }}"
        state: directory
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: '0755'