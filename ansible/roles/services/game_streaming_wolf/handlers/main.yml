---
# Wolf Game Streaming Role Handlers

- name: reload udev rules
  ansible.builtin.shell: udevadm control --reload-rules && udevadm trigger
  listen: reload udev rules

- name: restart wolf container
  ansible.builtin.command:
    cmd: docker compose up -d --force-recreate
    chdir: "{{ wolf_compose_dir }}"
  listen: restart wolf container

- name: reload systemd daemon
  ansible.builtin.command: systemctl daemon-reload
  listen: reload systemd daemon