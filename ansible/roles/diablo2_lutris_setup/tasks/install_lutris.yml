---
- name: Install Lutris on Arch Linux
  when: ansible_os_family == "Archlinux"
  block:
    - name: Check if Lutris is installed
      command: pacman -Q lutris
      register: lutris_check
      failed_when: false
      changed_when: false

    - name: Install Lutris dependencies (Arch)
      community.general.pacman:
        name:
          - wine
          - giflib
          - lib32-giflib
          - libpng
          - lib32-libpng
          - libldap
          - lib32-libldap
          - gnutls
          - lib32-gnutls
          - mpg123
          - lib32-mpg123
          - openal
          - lib32-openal
          - v4l-utils
          - lib32-v4l-utils
          - libpulse
          - lib32-libpulse
          - alsa-plugins
          - lib32-alsa-plugins
          - alsa-lib
          - lib32-alsa-lib
          - libjpeg-turbo
          - lib32-libjpeg-turbo
          - sqlite
          - lib32-sqlite
          - libxcomposite
          - lib32-libxcomposite
          - libxinerama
          - lib32-libxinerama
          - ncurses
          - lib32-ncurses
          - opencl-icd-loader
          - lib32-opencl-icd-loader
          - libxslt
          - lib32-libxslt
          - libva
          - lib32-libva
          - gtk3
          - lib32-gtk3
          - gst-plugins-base-libs
          - lib32-gst-plugins-base-libs
          - vulkan-icd-loader
          - lib32-vulkan-icd-loader
        state: present

    - name: Install Lutris (Arch)
      community.general.pacman:
        name: lutris
        state: present
      when: lutris_check.rc != 0

- name: Install Lutris on Debian/Ubuntu
  when: ansible_os_family == "Debian"
  block:
    - name: Add Lutris repository key
      apt_key:
        url: https://dl.winehq.org/wine-builds/winehq.key
        state: present

    - name: Add Lutris repository
      apt_repository:
        repo: "deb https://dl.winehq.org/wine-builds/ubuntu/{{ ansible_distribution_release }} main"
        state: present
        filename: winehq

    - name: Add Lutris stable repository
      apt_repository:
        repo: "ppa:lutris-team/lutris"
        state: present
        filename: lutris

    - name: Install Lutris dependencies (Debian)
      apt:
        name:
          - winehq-stable
          - lutris
        state: present
        update_cache: yes
