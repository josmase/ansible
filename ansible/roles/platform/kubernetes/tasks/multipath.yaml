- name: Ensure the multipath configuration directory exists
  file:
    path: /etc
    state: directory

- name: Create multipath.conf if it does not exist
  copy:
    dest: /etc/multipath.conf
    content: |
      defaults {
          user_friendly_names yes
      }
      blacklist {
          devnode "^sd[a-z0-9]+"
      }

- name: Add blacklist configuration to multipath.conf
  blockinfile:
    path: /etc/multipath.conf
    block: |
      blacklist {
          devnode "^sd[a-z0-9]+"
      }
    insertafter: EOF

- name: Gather service facts
  service_facts:

- name: Check if multipath command exists
  command: command -v multipath
  register: multipath_binary_check
  changed_when: false
  failed_when: false

- name: Determine multipathd service availability
  set_fact:
    multipathd_service_present: "{{ 'multipathd.service' in ansible_facts.services }}"

- name: Restart multipathd service
  service:
    name: multipathd
    state: restarted
  when: multipathd_service_present

- name: Verify multipath configuration
  command: multipath -t
  register: multipath_output
  changed_when: false
  failed_when: false
  when: multipath_binary_check.rc == 0

- name: Output verification result
  debug:
    msg: "{{ multipath_output.stdout }}"
  when: multipath_binary_check.rc == 0 and multipath_output is defined
